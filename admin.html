<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — MAKE A LAWYER</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #0A0A0A;
      color: #fff;
      min-height: 100vh;
    }

    /* 로그인 화면 */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #161616;
      border: 1px solid rgba(201,160,82,0.3);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-box h1 {
      font-size: 22px;
      margin-bottom: 8px;
      color: #C9A052;
    }
    .login-box p {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 32px;
    }
    .login-box input {
      width: 100%;
      padding: 14px 16px;
      background: #1E1E1E;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }
    .login-box input:focus {
      border-color: #C9A052;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: #C9A052;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .login-btn:hover { background: #E2C87A; }
    .error-msg {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* 관리자 화면 */
    #admin-screen { display: none; }
    .admin-header {
      background: #111;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-header h1 { font-size: 18px; color: #C9A052; }
    .logout-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.6);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .logout-btn:hover { border-color: #C9A052; color: #C9A052; }

    .admin-body { padding: 32px; }
    .stats-row {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px 28px;
      min-width: 160px;
    }
    .stat-card .label { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #C9A052; }

    .table-wrap {
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-header {
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .table-header h2 { font-size: 16px; }
    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(201,160,82,0.4);
      color: #C9A052;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .refresh-btn:hover { background: rgba(201,160,82,0.1); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead th {
      background: #161616;
      padding: 12px 16px;
      text-align: left;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.2s;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }
    tbody td {
      padding: 14px 16px;
      color: rgba(255,255,255,0.8);
      vertical-align: top;
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      background: rgba(201,160,82,0.15);
      color: #C9A052;
      border: 1px solid rgba(201,160,82,0.3);
    }
    .empty-row td {
      text-align: center;
      padding: 48px;
      color: rgba(255,255,255,0.3);
    }

    @media (max-width: 768px) {
      .admin-body { padding: 16px; }
      table { font-size: 12px; }
      thead th, tbody td { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-box">
    <h1>MAKE A LAWYER</h1>
    <p>관리자 전용 페이지입니다</p>
    <input type="password" id="password-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">로그인</button>
    <p class="error-msg" id="error-msg">비밀번호가 올바르지 않습니다</p>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>📋 상담 신청 관리</h1>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">전체 신청</div>
        <div class="value" id="total-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">오늘 신청</div>
        <div class="value" id="today-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">이번 달</div>
        <div class="value" id="month-count">-</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>상담 신청 목록</h2>
        <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>신청일시</th>
              <th>이름</th>
              <th>연락처</th>
              <th>이메일</th>
              <th>예산</th>
              <th>현재 마케팅</th>
              <th>메시지</th>
            </tr>
          </thead>
          <tbody id="data-table">
            <tr class="empty-row"><td colspan="8">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  // ===== 비밀번호 설정 (여기서 변경하세요) =====
  const ADMIN_PASSWORD = 'hjsjforever';

  // ===== Supabase 설정 =====
  const SUPABASE_URL = 'https://fawuchjmwhnicqpeerae.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhd3VjaGptd2huaWNxcGVlcmFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzgyMDEsImV4cCI6MjA5NjYxNDIwMX0.Tc4rSbMti2DEYalFjGyYVkcXe39Xu52xCPKHI83VCtc';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function login() {
    const pw = document.getElementById('password-input').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadData();
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  async function loadData() {
    const tbody = document.getElementById('data-table');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">불러오는 중...</td></tr>';

    const { data, error } = await db
      .from('consultations')
      .select('*')
      .order('created_at', { ascending: false });

    if (error || !data) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">데이터를 불러오지 못했습니다</td></tr>';
      return;
    }

    // 통계
    const today = new Date().toISOString().slice(0, 10);
    const month = new Date().toISOString().slice(0, 7);
    document.getElementById('total-count').textContent = data.length;
    document.getElementById('today-count').textContent = data.filter(r => r.created_at?.startsWith(today)).length;
    document.getElementById('month-count').textContent = data.filter(r => r.created_at?.startsWith(month)).length;

    if (data.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">신청 내역이 없습니다</td></tr>';
      return;
    }

    tbody.innerHTML = data.map((row, i) => `
      <tr>
        <td style="color:rgba(255,255,255,0.3)">${data.length - i}</td>
        <td style="white-space:nowrap">${formatDate(row.created_at)}</td>
        <td><strong>${row.name || '-'}</strong></td>
        <td>${row.phone || '-'}</td>
        <td style="font-size:12px">${row.email || '-'}</td>
        <td><span class="badge">${row.budget || '-'}</span></td>
        <td style="font-size:12px">${row.current_marketing || '-'}</td>
        <td style="max-width:200px; font-size:12px; color:rgba(255,255,255,0.6)">${row.message || '-'}</td>
      </tr>
    `).join('');
  }

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  }

  // 이미 로그인된 경우
  if (sessionStorage.getItem('admin_auth') === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  }
</script>
</body>
</html>
