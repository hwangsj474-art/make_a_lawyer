<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — MAKE A LAWYER</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* 로그인 */
    #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box {
      background:#fff; border:1px solid #dde3f0;
      border-radius:16px; padding:48px 40px; width:100%; max-width:400px; text-align:center;
      box-shadow: 0 4px 24px rgba(26,26,46,0.08);
    }
    .login-box h1 { font-size:22px; margin-bottom:8px; color:#1a1a2e; }
    .login-box p { font-size:13px; color:#7a8099; margin-bottom:32px; }
    .login-box input {
      width:100%; padding:14px 16px; background:#f5f7fc;
      border:1px solid #dde3f0; border-radius:8px;
      color:#1a1a2e; font-size:15px; margin-bottom:16px; outline:none;
    }
    .login-box input:focus { border-color:#2d4a8a; }
    .login-btn {
      width:100%; padding:14px; background:#2d4a8a; color:#fff;
      border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer;
    }
    .login-btn:hover { background:#1e3566; }
    .error-msg { color:#ff4d4f; font-size:13px; margin-top:12px; display:none; }

    /* 어드민 */
    #admin-screen { display:none; }
    .admin-header {
      background:#fff; border-bottom:1px solid #dde3f0;
      padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
      box-shadow: 0 2px 8px rgba(26,26,46,0.06);
    }
    .admin-header h1 { font-size:18px; color:#1a1a2e; }
    .logout-btn {
      background:transparent; border:1px solid #dde3f0;
      color:#7a8099; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px;
    }
    .logout-btn:hover { border-color:#2d4a8a; color:#2d4a8a; }

    .admin-body { padding:32px; }
    .stats-row { display:flex; gap:16px; margin-bottom:32px; flex-wrap:wrap; }
    .stat-card {
      background:#fff; border:1px solid #dde3f0;
      border-radius:12px; padding:20px 28px; min-width:160px;
      box-shadow: 0 2px 8px rgba(26,26,46,0.04);
    }
    .stat-card .label { font-size:13px; color:#7a8099; margin-bottom:8px; }
    .stat-card .value { font-size:28px; font-weight:700; color:#2d4a8a; }

    .table-wrap {
      background:#fff; border:1px solid #dde3f0;
      border-radius:12px; overflow:hidden;
      box-shadow: 0 2px 8px rgba(26,26,46,0.04);
    }
    .table-header {
      padding:20px 24px; border-bottom:1px solid #dde3f0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .table-header h2 { font-size:16px; color:#1a1a2e; }
    .refresh-btn {
      background:transparent; border:1px solid #2d4a8a;
      color:#2d4a8a; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:13px;
    }
    .refresh-btn:hover { background:#eef1f8; }

    table { width:100%; border-collapse:collapse; font-size:16px; }
    thead th {
      background:#f5f7fc; padding:12px 16px; text-align:left;
      color:#7a8099; font-size:14px; font-weight:600;
      letter-spacing:0.03em;
    }
    tbody tr { border-bottom:1px solid #f0f2f5; transition:background 0.2s; cursor:pointer; }
    tbody tr:hover { background:#eef1f8; }
    tbody td { padding:14px 16px; color:#1a1a2e; vertical-align:middle; }

    /* 상태 배지 */
    .status-select {
      background:#f5f7fc; border:1px solid #dde3f0;
      color:#1a1a2e; padding:6px 10px; border-radius:6px; font-size:13px; cursor:pointer;
    }
    .status-상담예정 { border-color:#e6940a; color:#e6940a; background:#fff8ed; }
    .status-단순문의 { border-color:#2d4a8a; color:#2d4a8a; background:#eef1f8; }
    .status-계약완료 { border-color:#2e9e44; color:#2e9e44; background:#edfaf1; }

    /* 메모 미리보기 */
    .memo-preview {
      font-size:13px; color:#7a8099; max-width:150px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .memo-preview.has-memo { color:#2d4a8a; }

    /* 삭제 버튼 */
    .delete-btn {
      background:#fff0f0; border:1px solid #ffb3b3;
      color:#cc0000; padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer;
    }
    .delete-btn:hover { background:#ffe0e0; }

    .empty-row td { text-align:center; padding:48px; color:#aab0c0; }

    /* 상세 모달 */
    .modal-overlay {
      display:none; position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.4); z-index:9999;
      align-items:center; justify-content:center; padding:20px;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:#fff; border-radius:16px; width:100%; max-width:560px;
      max-height:90vh; overflow-y:auto;
      box-shadow: 0 8px 40px rgba(26,26,46,0.18);
    }
    .modal-head {
      padding:24px 28px 20px; border-bottom:1px solid #dde3f0;
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-head h3 { font-size:17px; color:#1a1a2e; }
    .modal-close {
      background:transparent; border:none; font-size:22px;
      color:#aab0c0; cursor:pointer; line-height:1;
    }
    .modal-close:hover { color:#1a1a2e; }
    .modal-body { padding:24px 28px; }
    .modal-row {
      display:flex; gap:8px; margin-bottom:14px; align-items:flex-start;
    }
    .modal-label {
      font-size:12px; color:#7a8099; font-weight:600;
      min-width:90px; padding-top:2px;
    }
    .modal-val { font-size:15px; color:#1a1a2e; flex:1; }
    .modal-divider { border:none; border-top:1px solid #f0f2f5; margin:20px 0; }
    .modal-memo-area {
      width:100%; min-height:100px; padding:12px 14px;
      background:#f5f7fc; border:1px solid #dde3f0; border-radius:8px;
      color:#1a1a2e; font-size:14px; font-family:inherit;
      resize:vertical; outline:none; line-height:1.6;
    }
    .modal-memo-area:focus { border-color:#2d4a8a; }
    .modal-foot {
      padding:16px 28px 24px; display:flex; gap:10px; justify-content:flex-end;
    }
    .modal-save-btn {
      background:#2d4a8a; color:#fff; border:none;
      padding:10px 24px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;
    }
    .modal-save-btn:hover { background:#1e3566; }
    .modal-cancel-btn {
      background:#f5f7fc; color:#7a8099; border:1px solid #dde3f0;
      padding:10px 20px; border-radius:8px; font-size:14px; cursor:pointer;
    }
    .modal-cancel-btn:hover { background:#eef1f8; }

    @media (max-width:768px) {
      .admin-body { padding:16px; }
      table { font-size:13px; }
      thead th, tbody td { padding:10px 10px; }
    }
  </style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen">
  <div class="login-box">
    <h1>MAKE A LAWYER</h1>
    <p>관리자 전용 페이지입니다</p>
    <input type="password" id="password-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">로그인</button>
    <p class="error-msg" id="error-msg">비밀번호가 올바르지 않습니다</p>
  </div>
</div>

<!-- 어드민 -->
<div id="admin-screen">
  <div class="admin-header">
    <h1>📋 상담 신청 관리</h1>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card">
        <div class="label">전체 신청</div>
        <div class="value" id="total-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">오늘 신청</div>
        <div class="value" id="today-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">이번 달</div>
        <div class="value" id="month-count">-</div>
      </div>
      <div class="stat-card">
        <div class="label">계약완료</div>
        <div class="value" id="contract-count">-</div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-header">
        <h2>상담 신청 목록</h2>
        <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>신청일시</th>
              <th>이름</th>
              <th>연락처</th>
              <th>예산</th>
              <th>현재마케팅</th>
              <th>상태</th>
              <th>메모</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="data-table">
            <tr class="empty-row"><td colspan="9">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modal-title">상담 상세</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="modal-row"><span class="modal-label">이름</span><span class="modal-val" id="m-name">-</span></div>
      <div class="modal-row"><span class="modal-label">연락처</span><span class="modal-val" id="m-phone">-</span></div>
      <div class="modal-row"><span class="modal-label">이메일</span><span class="modal-val" id="m-email">-</span></div>
      <div class="modal-row"><span class="modal-label">예산</span><span class="modal-val" id="m-budget">-</span></div>
      <div class="modal-row"><span class="modal-label">현재마케팅</span><span class="modal-val" id="m-marketing">-</span></div>
      <div class="modal-row"><span class="modal-label">신청일시</span><span class="modal-val" id="m-date">-</span></div>
      <div class="modal-row" style="align-items:flex-start"><span class="modal-label">메시지</span><span class="modal-val" id="m-message" style="line-height:1.7; color:#4a5270">-</span></div>
      <hr class="modal-divider">
      <div style="margin-bottom:8px; font-size:13px; font-weight:600; color:#1a1a2e;">📝 메모</div>
      <textarea class="modal-memo-area" id="modal-memo" placeholder="메모를 입력하세요..."></textarea>
    </div>
    <div class="modal-foot">
      <button class="modal-cancel-btn" onclick="closeModal()">닫기</button>
      <button class="modal-save-btn" onclick="saveModalMemo()">메모 저장</button>
    </div>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = 'hjsjforever';
  const SUPABASE_URL = 'https://fawuchjmwhnicqpeerae.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhd3VjaGptd2huaWNxcGVlcmFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMzgyMDEsImV4cCI6MjA5NjYxNDIwMX0.Tc4rSbMti2DEYalFjGyYVkcXe39Xu52xCPKHI83VCtc';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentModalId = null;

  function login() {
    const pw = document.getElementById('password-input').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', 'true');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      loadData();
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('admin_auth');
    location.reload();
  }

  async function loadData() {
    const tbody = document.getElementById('data-table');
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">불러오는 중...</td></tr>';

    const { data, error } = await db
      .from('consultations')
      .select('*')
      .order('created_at', { ascending: false });

    if (error || !data) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="9">데이터를 불러오지 못했습니다</td></tr>';
      return;
    }

    const today = new Date().toISOString().slice(0, 10);
    const month = new Date().toISOString().slice(0, 7);
    document.getElementById('total-count').textContent = data.length;
    document.getElementById('today-count').textContent = data.filter(r => r.created_at?.startsWith(today)).length;
    document.getElementById('month-count').textContent = data.filter(r => r.created_at?.startsWith(month)).length;
    document.getElementById('contract-count').textContent = data.filter(r => r.status === '계약완료').length;

    if (data.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="9">신청 내역이 없습니다</td></tr>';
      return;
    }

    tbody.innerHTML = data.map((row, i) => `
      <tr id="row-${row.id}">
        <td style="color:#aab0c0">${data.length - i}</td>
        <td style="white-space:nowrap; font-size:13px; color:#7a8099">${formatDate(row.created_at)}</td>
        <td onclick="openModal('${row.id}')" style="cursor:pointer;">
          <strong style="color:#2d4a8a; text-decoration:underline; text-underline-offset:3px;">${row.name || '-'}</strong>
        </td>
        <td style="white-space:nowrap">${row.phone || '-'}</td>
        <td style="font-size:16px">${row.budget || '-'}</td>
        <td style="font-size:16px">${row.current_marketing || '-'}</td>
        <td>
          <select class="status-select status-${row.status || '단순문의'}" onchange="updateStatus('${row.id}', this)" onclick="event.stopPropagation()">
            <option value="단순문의" ${row.status === '단순문의' || !row.status ? 'selected' : ''}>🔵 단순문의</option>
            <option value="상담예정" ${row.status === '상담예정' ? 'selected' : ''}>🟡 상담예정</option>
            <option value="계약완료" ${row.status === '계약완료' ? 'selected' : ''}>🟢 계약완료</option>
          </select>
        </td>
        <td onclick="openModal('${row.id}')" style="cursor:pointer;">
          <span class="memo-preview ${row.memo ? 'has-memo' : ''}">${row.memo || '메모 없음 (클릭하여 추가)'}</span>
        </td>
        <td>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteRow('${row.id}')">삭제</button>
        </td>
      </tr>
    `).join('');
  }

  function openModal(id) {
    const row = document.getElementById(`row-${id}`);
    currentModalId = id;

    // 행에서 데이터 추출해서 모달에 표시
    db.from('consultations').select('*').eq('id', id).single().then(({ data }) => {
      if (!data) return;
      document.getElementById('modal-title').textContent = `${data.name || '-'} 상담 상세`;
      document.getElementById('m-name').textContent = data.name || '-';
      document.getElementById('m-phone').textContent = data.phone || '-';
      document.getElementById('m-email').textContent = data.email || '-';
      document.getElementById('m-budget').textContent = data.budget || '-';
      document.getElementById('m-marketing').textContent = data.current_marketing || '-';
      document.getElementById('m-date').textContent = formatDate(data.created_at);
      document.getElementById('m-message').textContent = data.message || '-';
      document.getElementById('modal-memo').value = data.memo || '';
    });

    document.getElementById('detail-modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('detail-modal').classList.remove('open');
    currentModalId = null;
  }

  async function saveModalMemo() {
    if (!currentModalId) return;
    const memo = document.getElementById('modal-memo').value;
    const { error } = await db.from('consultations').update({ memo }).eq('id', currentModalId);
    if (!error) {
      const btn = document.querySelector('.modal-save-btn');
      btn.textContent = '✓ 저장됨';
      setTimeout(() => { btn.textContent = '메모 저장'; }, 1500);
      // 테이블 메모 미리보기 업데이트
      const preview = document.querySelector(`#row-${currentModalId} .memo-preview`);
      if (preview) {
        preview.textContent = memo || '메모 없음 (클릭하여 추가)';
        preview.className = `memo-preview ${memo ? 'has-memo' : ''}`;
      }
    }
  }

  async function updateStatus(id, select) {
    const status = select.value;
    select.className = `status-select status-${status}`;
    await db.from('consultations').update({ status }).eq('id', id);
    const { data } = await db.from('consultations').select('status');
    if (data) document.getElementById('contract-count').textContent = data.filter(r => r.status === '계약완료').length;
  }

  async function deleteRow(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    const { error } = await db.from('consultations').delete().eq('id', id);
    if (!error) loadData();
  }

  function formatDate(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
  }

  // 모달 외부 클릭 시 닫기
  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  if (sessionStorage.getItem('admin_auth') === 'true') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  }
</script>
</body>
</html>
